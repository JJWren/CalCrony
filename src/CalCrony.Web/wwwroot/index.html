<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalCrony — events & calendars for Discord</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/site.css" />
    <!-- Synchronous on purpose (and a separate file, for CSP script-src 'self'):
         applies the stored theme before first paint so there's no flash. -->
    <script src="js/theme-init.js"></script>
</head>

<body>
    <div id="app">
        <div class="app-splash">
            <div class="spinner-border text-primary" role="status"></div>
            <p>Loading CalCrony…</p>
        </div>
    </div>

    <div id="blazor-error-ui" class="alert alert-danger m-3" style="display:none">
        Something went wrong. <a href="." class="alert-link">Reload</a>
        <span class="dismiss float-end" role="button">✕</span>
    </div>
    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/site.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
