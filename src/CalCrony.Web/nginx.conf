server {
    # busybox wget (the compose healthcheck) resolves localhost to ::1 first on current
    # nginx:alpine images, and a bare "listen 80" is IPv4-only.
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_types application/wasm application/javascript application/json application/octet-stream text/css text/javascript image/svg+xml;

    # Security headers (CSP etc.). Re-included inside every location below that has
    # its own add_header: nginx's add_header inheritance is all-or-nothing.
    include /etc/nginx/conf.d/calcrony-security-headers.inc;

    # Fingerprinted Blazor framework assets never change under the same name.
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/conf.d/calcrony-security-headers.inc;
        try_files $uri =404;
    }

    # The two UNfingerprinted entry files: caching them immutable would pin returning
    # browsers to the previous deployment forever. Exact matches outrank the prefix block.
    location = /_framework/blazor.webassembly.js {
        add_header Cache-Control "no-cache";
        include /etc/nginx/conf.d/calcrony-security-headers.inc;
    }

    location = /_framework/dotnet.js {
        add_header Cache-Control "no-cache";
        include /etc/nginx/conf.d/calcrony-security-headers.inc;
    }

    # The host page and runtime config must always revalidate so deploys and
    # API_BASE_URL changes take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
        include /etc/nginx/conf.d/calcrony-security-headers.inc;
    }

    location = /appsettings.json {
        add_header Cache-Control "no-cache";
        include /etc/nginx/conf.d/calcrony-security-headers.inc;
    }

    # SPA fallback: client-side routes (/docs, /app/events/..., ...) serve the host page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
